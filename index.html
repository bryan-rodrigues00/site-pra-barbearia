<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Barbearia Premium</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="login-container">
        <h2>Barbearia</h2>
        <form id="loginForm">
            <div class="input-group">
                <label for="email">E-mail</label>
                <input type="text" id="email" placeholder="seu@email.com" required>
            </div>
            <div class="input-group">
                <label for="password">Senha</label>
                <input type="password" id="password" placeholder="********" required>
            </div>
            <button type="submit" class="btn-login">Entrar</button>
            <p id="error" class="error-message">Por favor, insira um e-mail válido (com @).</p>
        </form>
    </div>

    <script src="script.js"></script>
    <a href="http://127.0.0.1:5500/index.html">barbearia</a>
</body>
</html>
